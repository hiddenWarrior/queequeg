[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "harpoon"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "networkx",
    "mcp",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[project.scripts]
harpoon = "harpoon.cli:main"
harpoon-mcp = "harpoon.mcp_server:main"
